<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>404 - 资源未找到</title> <style> :root { --bg: #0b1120; --card-bg: #1e293b; --card-border: #334155; --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.4); --error: #ef4444; --success: #10b981; } * { margin: 0; padding: 0; box-sizing: border-box; } body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; } .container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 3rem 2rem; width: 90%; max-width: 480px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); animation: slideUp 0.6s ease-out; } @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } } .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--accent), #8b5cf6, var(--accent)); background-size: 200% 100%; animation: gradientMove 3s linear infinite; } @keyframes gradientMove { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } } .icon-area { width: 100px; height: 100px; margin: 0 auto 2rem; position: relative; } .file-svg { width: 100%; height: 100%; fill: none; stroke-width: 2; } .file-body { stroke: var(--text-sub); stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawFile 1.5s ease-out forwards 0.3s; } .file-tear { stroke: var(--error); stroke-width: 2.5; stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawTear 0.8s ease-out forwards 1.2s; } .file-icon-mark { fill: var(--error); opacity: 0; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 1.8s; } @keyframes drawFile { to { stroke-dashoffset: 0; } } @keyframes drawTear { to { stroke-dashoffset: 0; } } @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } } h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } .error-code { display: inline-block; background: rgba(239, 68, 68, 0.1); color: var(--error); padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; margin-bottom: 1rem; border: 1px solid rgba(239, 68, 68, 0.2); } .desc { color: var(--text-sub); margin-bottom: 2.5rem; line-height: 1.6; font-size: 1.05rem; } .file-path { display: block; font-family: 'Courier New', monospace; color: var(--success); opacity: 0.7; margin-top: 0.5rem; font-size: 0.9rem; word-break: break-all; } .btn { display: inline-block; padding: 12px 32px; font-size: 1rem; font-weight: 600; color: #fff; background: var(--accent); border: none; border-radius: 6px; text-decoration: none; transition: all 0.2s ease; box-shadow: 0 4px 12px var(--accent-glow); position: relative; overflow: hidden; } .btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 6px 16px var(--accent-glow); } .btn:active { transform: translateY(0); } .data-blob { position: absolute; background: var(--accent); border-radius: 50%; filter: blur(60px); opacity: 0.15; z-index: -1; pointer-events: none; } .blob-1 { width: 300px; height: 300px; top: -100px; left: -100px; } .blob-2 { width: 200px; height: 200px; bottom: -50px; right: -50px; background: #8b5cf6; } @media (max-width: 480px) { h1 { font-size: 2.5rem; } .container { padding: 2rem 1.5rem; width: 95%; } .icon-area { width: 80px; height: 80px; } } </style> </head> <body> <div class="data-blob blob-1"></div> <div class="data-blob blob-2"></div> <div class="container"> <div class="icon-area"> <svg class="file-svg" viewBox="0 0 100 100"> <path class="file-body" d="M30 15 L60 15 L75 30 L75 85 A5 5 0 0 1 70 90 L30 90 A5 5 0 0 1 25 85 L25 20 A5 5 0 0 1 30 15 Z" fill="#334155" stroke="#94a3b8" /> <path class="file-body" d="M60 15 L60 30 L75 30" fill="#475569" stroke="#94a3b8" stroke-width="2" /> <path class="file-tear" d="M20 45 Q40 35 60 45 T85 35" /> <path class="file-icon-mark" d="M68 68 L82 82 M82 68 L68 82" stroke="#ef4444" stroke-width="4" stroke-linecap="round" /> </svg> </div> <div class="error-code">ERR_RESOURCE_NOT_FOUND</div> <h1>404</h1> <p class="desc"> 请求的资源文件不存在。<br> 可能是链接已失效或文件已被移动。 </p> <a href="/src" class="btn">返回首页</a> </div> </body> </html>
